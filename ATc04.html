<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recursos Multimídia — Cap. 4 / Ativ. 4</title>
    <link rel="stylesheet" href="../style.css">
</head>

<body>

    <header>
        <h1>Página Multimídia</h1>
    </header>

    <main>

        <!-- BLOCO 1 -->
        <figure>

            <video
                controls
                width="800"
                height="450"
                poster="poster-video.jpg"
                preload="metadata">

                <source src="videos/html.mp4" type="video/mp4">
                <source src="videos/html.webm" type="video/webm">

                <track
                    kind="subtitles"
                    src="legendas/video-html.vtt"
                    srclang="pt"
                    label="Português"
                    default>

                <p>
                    Seu navegador não consegue reproduzir este vídeo.
                    <a href="videos/html.mp4">
                        Fazer download do arquivo
                    </a>
                </p>

            </video>

            <figcaption>
                Apresentação introdutória sobre construção de páginas web.
                Fonte: material educacional digital.
            </figcaption>

        </figure>

        <hr>

        <!-- BLOCO 2 -->
        <figure>

            <audio controls preload="metadata">

                <source src="audios/episodio.mp3" type="audio/mpeg">
                <source src="audios/episodio.ogg" type="audio/ogg">

                <p>
                    O áudio não é suportado pelo navegador.
                    <a href="audios/episodio.mp3">
                        Baixar gravação
                    </a>
                </p>

            </audio>

            <figcaption>
                Episódio sobre evolução das tecnologias web.
                <a href="transcricao.html">
                    Consultar transcrição
                </a>
            </figcaption>

        </figure>

        <hr>

        <!-- BLOCO 3 -->
        <figure>

            <iframe
                width="800"
                height="450"
                src="https://www.youtube-nocookie.com/embed/Fhy-5CtVkiM"
                title="Vídeo introdutório de HTML"
                loading="lazy"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen>
            </iframe>

            <figcaption>
                Conteúdo educacional hospedado no YouTube sobre HTML básico.
                Plataforma: YouTube.
            </figcaption>

        </figure>

        <hr>

        <!-- BLOCO 4 -->
        <figure>

            <picture>

                <source
                    media="(min-width: 768px)"
                    srcset="img/banner-wide.jpg">

                <img
               src="img/banner-mobile.jpg"
                    alt="Estudante programando num computador"
                    width="400"
                    height="300">

            </picture>

            <figcaption>
                Imagem representando estudo e aprendizado tecnológico.
            </figcaption>

        </figure>

    </main>

    <footer>
        <p>Nome: Elldy Matheus da Silva Alexandre</p>
        <p>Matrícula: 2026307374</p>
        <p>Data: 21/05/2026</p>
    </footer>

    <p>
        <a href="../Index.html">
            ← Voltar para a página principal
        </a>
    </p>

</body>
</html>
